apiVersion: apps/v1
kind: Deployment  #what kube object

metadata:
  name: hashgenerator-dep  #kube name of deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hashgenerator  #deploy's filter/search condition.

  template:
    metadata:
      labels:
        app: hashgenerator  #sticker for pod, must match

    spec:
      containers:
        - name: hashgenerator
          image: jakousa/dwk-app1:b7fc18de2376da80ff0cfc72cf581a9f94d10e64