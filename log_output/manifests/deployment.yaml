apiVersion: apps/v1
kind: Deployment  #what kube object

metadata:
  name: log-output  #kube name of deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: log-output  #deploy's filter/search condition.

  template:
    metadata:
      labels:
        app: log-output  #sticker for pod, must match

    spec:
      containers:
        - name: log-output
          image: log-output:1.3
          imagePullPolicy: IfNotPresent